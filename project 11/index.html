<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #b9c2d0;
      --panel: rgba(12, 18, 31, 0.66);
      --line: rgba(255, 255, 255, 0.16);
      --rose: #ff4d8d;
      --cyan: #48e7ff;
      --gold: #ffd166;
      --green: #6ee7b7;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 77, 141, 0.24), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(72, 231, 255, 0.22), transparent 30%),
        radial-gradient(circle at 75% 84%, rgba(255, 209, 102, 0.18), transparent 34%),
        linear-gradient(135deg, #111827 0%, #07111f 46%, #170f2b 100%);
    }

    .scene {
      position: relative;
      width: min(92vw, 920px);
      padding: clamp(28px, 6vw, 74px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.46), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(26px);
      isolation: isolate;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--rose), var(--cyan), var(--gold), var(--green));
      opacity: 0.42;
      filter: blur(18px);
      animation: glow 7s ease-in-out infinite alternate;
    }

    .sparkle {
      position: absolute;
      width: 11px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.9);
      opacity: 0.74;
      animation: float 5s ease-in-out infinite;
    }

    .sparkle:nth-child(1) { top: 11%; left: 9%; }
    .sparkle:nth-child(2) { top: 19%; right: 14%; width: 7px; animation-delay: -1.7s; }
    .sparkle:nth-child(3) { right: 20%; bottom: 15%; width: 9px; animation-delay: -3s; }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 14vw, 9.8rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .gradient-text {
      display: inline-block;
      color: transparent;
      background: linear-gradient(90deg, #fff 0%, var(--cyan) 30%, var(--rose) 63%, var(--gold) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      filter: drop-shadow(0 18px 34px rgba(72, 231, 255, 0.18));
    }

    .copy {
      max-width: 620px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.22rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .button.primary {
      border-color: transparent;
      color: #09111f;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      box-shadow: 0 18px 42px rgba(72, 231, 255, 0.18);
    }

    .button:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.36);
      background: rgba(255, 255, 255, 0.13);
    }

    .button.primary:hover { background: linear-gradient(90deg, var(--gold), var(--cyan)); }

    @keyframes glow {
      from { transform: scale(0.98) rotate(0deg); }
      to { transform: scale(1.02) rotate(1deg); }
    }

    @keyframes float {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(10px, -16px, 0) scale(1.25); }
    }

    @media (max-width: 620px) {
      body { overflow: auto; padding: 22px; }
      .scene { border-radius: 22px; }
      .actions, .button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Fancy Hello World page">
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>

    <p class="eyebrow">First page energy</p>
    <h1>Hello<br><span class="gradient-text">World</span></h1>
    <p class="copy">
      A tiny classic dressed up for the occasion: glassy depth, luminous color,
      soft motion, and just enough sparkle to make the browser feel awake.
    </p>
    <div class="actions" aria-label="Page actions">
      <a class="button primary" href="#" onclick="event.preventDefault(); alert('Hello from your fancy HTML page!');">Say Hello</a>
      <a class="button" href="https://developer.mozilla.org/en-US/docs/Learn/Getting_started_with_the_web/HTML_basics">HTML Basics</a>
    </div>
  </main>
</body>
</html>
